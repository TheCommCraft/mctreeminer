# Minecraft / Fabric versions - adjust to match the Baritone build you use.
# Baritone releases are versioned per-Minecraft-version, so keep these in lockstep
# with whatever Baritone jar/JitPack tag you depend on.
minecraft_version=1.21.11
yarn_mappings=1.21.11+build.4
loader_version=0.18.1
loom_version=1.14-SNAPSHOT

fabric_version=0.141.4+1.21.11

mod_version=1.0.0
maven_group=com.minetree
archives_base_name=minetree

# Baritone publishes client-only jars, generally consumed via JitPack.
# WARNING: as of writing there is no official Baritone release for 1.21.11
# (latest tagged release v1.15.0 covers 1.21.6-1.21.8 only). See the README
# for options while you wait on/build against a compatible Baritone.
baritone_version=1.15.0
